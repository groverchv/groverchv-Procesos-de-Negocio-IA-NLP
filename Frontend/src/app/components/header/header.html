<nz-header class="app-header">
  <div class="header-content">
    <div class="logo-section" routerLink="/">
      <div class="logo-box">
        <span nz-icon nzType="deployment-unit" nzTheme="outline"></span>
      </div>
      <span class="logo-text">BPMN<span class="logo-accent">Flow</span></span>
    </div>

    <div class="nav-section">
      <nz-space nzSize="middle">
        <button nz-button nzType="text" [routerLink]="isStaff ? '/staff/projects' : '/designer/projects'">Proyectos</button>
      </nz-space>
    </div>

    <div class="user-section">
      <nz-space nzSize="large">
        <div class="user-profile">
          <nz-avatar nzIcon="user" [style.backgroundColor]="isStaff ? '#10b981' : '#7c3aed'"></nz-avatar>
          <span class="user-name">{{ isStaff ? 'Funcionario' : 'Administrador' }}</span>
        </div>
      </nz-space>
    </div>
  </div>
</nz-header>
