steps:
  # Build and Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bpmnflow-backend', './Backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bpmnflow-backend']

  # Build and Push Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bpmnflow-frontend', './Frontend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bpmnflow-frontend']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bpmnflow-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/bpmnflow-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'SPRING_DATA_MONGODB_URI=mongodb+srv://muertemuerte60_db_user:5HIqYsURiCS0hzcz@negocios.i0pwzrg.mongodb.net/proceso?retryWrites=true&w=majority&appName=Negocios'

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bpmnflow-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/bpmnflow-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/bpmnflow-backend'
  - 'gcr.io/$PROJECT_ID/bpmnflow-frontend'
